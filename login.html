<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - File Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 28px;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #6b7280;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
        }

        .remember-me label {
            font-size: 14px;
            color: #6b7280;
            cursor: pointer;
            user-select: none;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d1fae5;
            border: 1px solid #a7f3d0;
            color: #059669;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Autofill indicator badge */
        .autofill-badge {
            display: none;
            align-items: center;
            gap: 6px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #2563eb;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        .autofill-badge.show {
            display: flex;
        }

        .autofill-badge .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #bfdbfe;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            background: white;
            padding: 0 12px;
            color: #9ca3af;
            font-size: 13px;
            position: relative;
        }

        /*
         * CSS autofill detection trick:
         * When the browser autofills an input, it applies the :-webkit-autofill
         * pseudo-class. We attach a dummy animation to that state so JS can
         * listen for the animationstart event as a reliable autofill signal.
         */
        @keyframes onAutoFillStart  { from {} to {} }
        @keyframes onAutoFillCancel { from {} to {} }

        input:-webkit-autofill {
            animation-name: onAutoFillStart;
            animation-duration: 1ms;
        }

        input:not(:-webkit-autofill) {
            animation-name: onAutoFillCancel;
            animation-duration: 1ms;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Sign in to access your files</p>
    </div>

    <div id="errorMessage"   class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    <div id="autofillBadge"  class="autofill-badge">
        <span class="spinner"></span>
        <span>Credentials detected — signing you in…</span>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
            >
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
            >
        </div>

        <div class="remember-me">
            <input type="checkbox" id="rememberMe" name="rememberMe">
            <label for="rememberMe">Keep me logged in</label>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
            Sign In
        </button>
    </form>
</div>

<script>
    const loginForm      = document.getElementById('loginForm');
    const loginBtn       = document.getElementById('loginBtn');
    const errorMessage   = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const autofillBadge  = document.getElementById('autofillBadge');
    const usernameInput  = document.getElementById('username');
    const passwordInput  = document.getElementById('password');

    // ── 0. Redirect if already logged in ────────────────────────────────────
    const existingToken = localStorage.getItem('sessionToken') || sessionStorage.getItem('sessionToken');
    if (existingToken) {
        window.location.href = '/';
    }

    // ── 1. Core login function (shared by manual submit & autofill) ──────────
    async function attemptLogin({ username, password, rememberMe = false, isAutofill = false } = {}) {
        errorMessage.classList.remove('show');
        successMessage.classList.remove('show');

        loginBtn.disabled    = true;
        loginBtn.textContent = 'Signing in…';

        try {
            const response = await fetch(
                `/api/login?user_name=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            );
            const data = await response.json();

            if (response.ok && data.status === 'success' && data.token) {
                if (rememberMe) {
                    localStorage.setItem('sessionToken', data.token);
                } else {
                    sessionStorage.setItem('sessionToken', data.token);
                }

                autofillBadge.classList.remove('show');
                successMessage.textContent = isAutofill
                    ? 'Autofill detected — logged in! Redirecting…'
                    : 'Login successful! Redirecting…';
                successMessage.classList.add('show');

                setTimeout(() => { window.location.href = '/'; }, 1000);
            } else {
                autofillBadge.classList.remove('show');
                errorMessage.textContent = data.message || 'Invalid username or password';
                errorMessage.classList.add('show');
                loginBtn.disabled    = false;
                loginBtn.textContent = 'Sign In';
            }
        } catch (err) {
            console.error('Login error:', err);
            autofillBadge.classList.remove('show');
            errorMessage.textContent = 'Connection error. Please try again.';
            errorMessage.classList.add('show');
            loginBtn.disabled    = false;
            loginBtn.textContent = 'Sign In';
        }
    }

    // ── 2. Manual form submit ────────────────────────────────────────────────
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        attemptLogin({
            username:   usernameInput.value,
            password:   passwordInput.value,
            rememberMe: document.getElementById('rememberMe').checked,
            isAutofill: false,
        });
    });

    // ── 3. Autofill detection ────────────────────────────────────────────────
    //
    // Strategy A — CSS animationstart trick (Chrome, Edge, Safari, Firefox)
    // The CSS above fires "onAutoFillStart" when :-webkit-autofill is applied.
    // We track which fields have been autofilled; when BOTH are filled we log in.
    //
    // Strategy B — polling fallback (catches browsers that skip the animation)
    // Every 300 ms for the first 3 s after page load we check whether both
    // inputs have a non-empty value that the user never typed (no input event).

    let autofillState = { username: false, password: false };
    let autofillLoginScheduled = false;

    function handleAutofillDetected(fieldName) {
        autofillState[fieldName] = true;

        if (autofillState.username && autofillState.password && !autofillLoginScheduled) {
            autofillLoginScheduled = true;
            autofillBadge.classList.add('show');

            // Small delay lets the browser finish populating the values
            setTimeout(() => {
                attemptLogin({
                    username:   usernameInput.value,
                    password:   passwordInput.value,
                    rememberMe: document.getElementById('rememberMe').checked,
                    isAutofill: true,
                });
            }, 600);
        }
    }

    // Strategy A: CSS animation event
    [usernameInput, passwordInput].forEach(input => {
        input.addEventListener('animationstart', (e) => {
            if (e.animationName === 'onAutoFillStart') {
                handleAutofillDetected(input.name);
            }
            if (e.animationName === 'onAutoFillCancel') {
                autofillState[input.name] = false;
            }
        });
    });

    // Strategy B: Polling fallback (runs for 3 s, 300 ms interval)
    // Only triggers if the user hasn't manually typed into either field yet.
    let userHasTyped = false;
    [usernameInput, passwordInput].forEach(input => {
        input.addEventListener('input', () => { userHasTyped = true; });
    });

    const pollStart    = Date.now();
    const pollInterval = setInterval(() => {
        if (autofillLoginScheduled || userHasTyped) {
            clearInterval(pollInterval);
            return;
        }
        if (Date.now() - pollStart > 3000) {
            clearInterval(pollInterval);
            return;
        }

        const uFilled = usernameInput.value.length > 0;
        const pFilled = passwordInput.value.length > 0;

        if (uFilled) autofillState.username = true;
        if (pFilled) autofillState.password = true;

        if (uFilled && pFilled) {
            clearInterval(pollInterval);
            handleAutofillDetected('username'); // will no-op if already scheduled
            handleAutofillDetected('password');
        }
    }, 300);
</script>
</body>
</html>
